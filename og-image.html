<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OG Image — 크루즈로그</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Montserrat:wght@800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      font-family: 'Noto Sans KR', sans-serif;
      background:
        linear-gradient(135deg, rgba(26,53,87,0.92) 0%, rgba(26,53,87,0.6) 60%, rgba(255,107,71,0.4) 100%),
        url('https://images.pexels.com/photos/813011/pexels-photo-813011.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .top-bar {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 12px;
      background: #FF6B47;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 500;
      width: fit-content;
      margin-bottom: 30px;
    }
    .dot {
      width: 10px; height: 10px;
      background: #FF6B47;
      border-radius: 50%;
    }
    h1 {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 900;
      font-size: 92px;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 32px;
    }
    h1 .accent {
      color: #FF6B47;
    }
    .subtitle {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      max-width: 850px;
      margin-bottom: 40px;
    }
    .footer {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: auto;
    }
    .logo {
      width: 70px; height: 70px;
      background: #1A3557;
      border: 3px solid #FF6B47;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }
    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 38px;
      letter-spacing: -0.5px;
    }
    .brand-handle {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }
    .ship {
      position: absolute;
      bottom: 60px;
      right: 80px;
      font-size: 220px;
      opacity: 0.15;
      transform: rotate(-10deg);
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="ship">🚢</div>

  <div class="badge">
    <span class="dot"></span>
    <span>매일 새 크루즈 정보 자동 업로드</span>
  </div>

  <h1>크루즈, <span class="accent">처음이어도</span><br>괜찮아요 🚢</h1>

  <p class="subtitle">
    크루즈 입문자를 위한 친절한 가이드<br>
    실제 비용 공개 · 예약법 A to Z · 선사 비교 · 꿀팁
  </p>

  <div class="footer">
    <div class="logo">🚢</div>
    <div>
      <div class="brand-name">CruiseLog</div>
      <div class="brand-handle">@cruiselog_kr · cruiselog.kr</div>
    </div>
  </div>
</body>
</html>
