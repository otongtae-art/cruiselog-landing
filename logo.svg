<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="크루즈로그 CruiseLog">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3557"/>
      <stop offset="100%" stop-color="#274B7B"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B47" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF8C6B" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Logo mark (square) -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#bgGrad)"/>

  <!-- Cruise ship silhouette (custom path, not emoji) -->
  <g transform="translate(40 40)">
    <!-- Hull -->
    <path d="M -22 6 L 22 6 L 18 14 L -18 14 Z" fill="#FFFFFF"/>
    <!-- Mid deck -->
    <rect x="-18" y="-2" width="36" height="8" fill="#FFFFFF" opacity="0.95"/>
    <!-- Upper cabins -->
    <rect x="-12" y="-9" width="24" height="7" fill="#FFFFFF" opacity="0.85"/>
    <!-- Bridge -->
    <rect x="-5" y="-15" width="10" height="6" fill="#FFFFFF" opacity="0.75"/>
    <!-- Funnel (Coral accent) -->
    <rect x="6" y="-13" width="4" height="9" fill="#FF6B47"/>
    <!-- Portholes -->
    <circle cx="-10" cy="2" r="1.4" fill="#1A3557"/>
    <circle cx="-4" cy="2" r="1.4" fill="#1A3557"/>
    <circle cx="2" cy="2" r="1.4" fill="#1A3557"/>
    <circle cx="8" cy="2" r="1.4" fill="#1A3557"/>
  </g>

  <!-- Wave under ship -->
  <path d="M 8 62 Q 20 58 32 62 T 56 62 T 72 62" stroke="url(#waveGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="92" y="42" font-family="Montserrat, 'Noto Sans KR', sans-serif" font-size="28" font-weight="800" fill="#1A3557" letter-spacing="-0.5">CruiseLog</text>
  <text x="92" y="62" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="500" fill="#FF6B47" letter-spacing="0.5">크루즈로그 · @cruiselog_kr</text>
</svg>
